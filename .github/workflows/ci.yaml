name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra tools

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src
        continue-on-error: true

      - name: Pytest
        run: uv run pytest -q
