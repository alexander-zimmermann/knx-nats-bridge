# Minimal generic Kubernetes example.
# Adapt namespace, secret references, and image tag for your cluster.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: knx-nats-bridge-catalog
data:
  knx-catalog.yaml: |
    "1/0/1": { name: "Living room light", dpt: "1.001" }
    "2/0/1": { name: "Living room temperature", dpt: "9.001" }
---
apiVersion: v1
kind: Secret
metadata:
  name: knx-nats-bridge-nats
type: Opaque
stringData:
  nats.creds: |
    -----BEGIN NATS USER JWT-----
    ...your creds here...
    ------END NATS USER JWT------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knx-nats-bridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: knx-nats-bridge
  template:
    metadata:
      labels:
        app: knx-nats-bridge
    spec:
      automountServiceAccountToken: false
      containers:
        - name: bridge
          image: ghcr.io/alexander-zimmermann/knx-nats-bridge:latest
          env:
            - name: KNX_CONNECTION_TYPE
              value: tunneling_tcp
            - name: KNX_GATEWAY_HOST
              value: 192.0.2.10
            - name: NATS_SERVERS
              value: nats://nats.nats.svc.cluster.local:4222
            - name: NATS_SUBJECT_PREFIX
              value: knx
            - name: KNX_NATS_CATALOG_PATH
              value: /etc/knx-nats-bridge/knx-catalog.yaml
            - name: NATS_CREDS_FILE
              value: /etc/knx-nats-bridge/nats.creds
            - name: LOG_FORMAT
              value: json
          ports:
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: catalog
              mountPath: /etc/knx-nats-bridge/knx-catalog.yaml
              subPath: knx-catalog.yaml
              readOnly: true
            - name: nats
              mountPath: /etc/knx-nats-bridge/nats.creds
              subPath: nats.creds
              readOnly: true
      volumes:
        - name: catalog
          configMap:
            name: knx-nats-bridge-catalog
        - name: nats
          secret:
            secretName: knx-nats-bridge-nats
---
apiVersion: v1
kind: Service
metadata:
  name: knx-nats-bridge
spec:
  selector:
    app: knx-nats-bridge
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
